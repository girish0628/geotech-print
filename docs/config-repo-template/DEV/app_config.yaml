# DEV Environment Configuration
# -------------------------------------------------------
# This file lives in the separate config repo:
#   geotech-print-config/DEV/app_config.yaml
# It is NEVER committed to the automation repo.
# -------------------------------------------------------
environment: DEV

# ArcPy / Geodatabase settings
arcpy:
  workspace: "C:/GISData/dev/project.gdb"
  feature_class: "ROADS"
  fields:
    - name: ROAD_WIDTH
      type: DOUBLE
    - name: SURFACE_TYPE
      type: TEXT
      length: 50

# FME Flow webhook settings
fme:
  webhook_url: "https://fme.company.com/fmeserver/webhooks/workflow-dev"
  timeout: 60
