# PROD Environment Configuration
# -------------------------------------------------------
# This file lives in the separate config repo:
#   geotech-print-config/PROD/app_config.yaml
# -------------------------------------------------------
environment: PROD

arcpy:
  workspace: "C:/GISData/prod/project.gdb"
  feature_class: "ROADS"
  fields:
    - name: ROAD_WIDTH
      type: DOUBLE
    - name: SURFACE_TYPE
      type: TEXT
      length: 50

fme:
  webhook_url: "https://fme.company.com/fmeserver/webhooks/workflow-prod"
  timeout: 120
